<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Opera Stuffs</title>
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/dracula.min.css"
		/>
		<style>
			:root {
				color-scheme: dark;
				font-family:
					Inter,
					ui-sans-serif,
					system-ui,
					-apple-system,
					BlinkMacSystemFont,
					"Segoe UI",
					sans-serif;
				line-height: 1.6;
				--bg: #282a36;
				--panel: #1f2230;
				--panel-border: #44475a;
				--tab-bg: #343746;
				--tab-active: #bd93f9;
				--text: #f8f8f2;
				--muted: #c6cad8;
				--code-bg: #1b1d27;
				--code-border: #44475a;
				--accent: #8be9fd;
				--accent-strong: #ff79c6;
				--success: #50fa7b;
			}

			body {
				margin: 0;
				padding: 32px 20px;
				background:
					radial-gradient(
						circle at top left,
						rgba(189, 147, 249, 0.16),
						transparent 28%
					),
					radial-gradient(
						circle at top right,
						rgba(139, 233, 253, 0.12),
						transparent 24%
					),
					var(--bg);
				color: var(--text);
			}

			main {
				max-width: 920px;
				margin: 0 auto;
			}

			.code-card {
				position: relative;
				padding-top: 1.2rem;
				margin-bottom: 1.5rem;
			}

			.code-path-line {
				margin: 0 0 0.8rem;
				color: var(--muted);
				font-size: 0.95rem;
				word-break: break-word;
			}

			.code-path-label {
				font-weight: 600;
				color: var(--accent);
			}

			p {
				margin: 0 0 1rem;
				color: var(--muted);
			}

			code {
				font-family:
					"Cascadia Mono", "SFMono-Regular", Consolas,
					"Liberation Mono", monospace;
				font-size: 0.95em;
				background: rgba(248, 248, 242, 0.08);
				padding: 0.15rem 0.4rem;
				border-radius: 0.4rem;
				color: var(--text);
			}

			.code-shell {
				position: relative;
				margin-top: -1px;
				background: linear-gradient(
					180deg,
					rgba(68, 71, 90, 0.8),
					rgba(68, 71, 90, 0.35)
				);
				border: 1px solid var(--panel-border);
				border-radius: 0 18px 18px 18px;
				box-shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
				overflow: hidden;
			}

			.code-tab {
				display: inline-flex;
				align-items: center;
				gap: 0.5rem;
				padding: 0.72rem 1rem 0.8rem;
				background: var(--tab-bg);
				color: var(--text);
				border: 1px solid var(--panel-border);
				border-bottom: 0;
				border-radius: 14px 14px 0 0;
				font-weight: 600;
				letter-spacing: 0.01em;
				box-shadow: 0 -1px 0 rgba(255, 255, 255, 0.02) inset;
				position: relative;
				top: 1px;
			}

			.code-tab::before {
				content: "";
				display: inline-block;
				width: 0.55rem;
				height: 0.55rem;
				border-radius: 999px;
				background: var(--tab-active);
				box-shadow: 0 0 0 4px rgba(189, 147, 249, 0.15);
			}

			.code-toolbar {
				position: absolute;
				top: 0.9rem;
				right: 0.9rem;
				z-index: 2;
			}

			.copy-button {
				display: inline-flex;
				align-items: center;
				gap: 0.45rem;
				padding: 0.55rem 0.8rem;
				border: 1px solid rgba(248, 248, 242, 0.16);
				border-radius: 10px;
				background: rgba(20, 22, 30, 0.88);
				color: var(--text);
				font: inherit;
				cursor: pointer;
				backdrop-filter: blur(10px);
				transition:
					transform 120ms ease,
					border-color 120ms ease,
					background 120ms ease;
			}

			.copy-button:hover {
				transform: translateY(-1px);
				border-color: rgba(139, 233, 253, 0.5);
				background: rgba(30, 34, 47, 0.95);
			}

			.copy-button:active {
				transform: translateY(0);
			}

			.copy-button[data-state="copied"] {
				border-color: rgba(80, 250, 123, 0.5);
				color: var(--success);
			}

			.copy-button svg {
				width: 0.95rem;
				height: 0.95rem;
				fill: currentColor;
			}

			pre {
				margin: 0;
				padding: 3.25rem 1.15rem 1.15rem;
				overflow-x: auto;
				background: var(--code-bg);
				color: var(--text);
				border-top: 1px solid var(--code-border);
			}

			pre code {
				background: transparent;
				padding: 0;
				border-radius: 0;
				color: inherit;
				white-space: pre;
				font-size: 0.96rem;
				line-height: 1.7;
				tab-size: 2;
			}

			.code-shell:hover .code-toolbar {
				opacity: 1;
			}

			.code-toolbar {
				opacity: 0.86;
				transition: opacity 120ms ease;
			}

			.hljs {
				background: transparent;
				padding: 0;
			}

			.hljs-comment,
			.hljs-quote {
				color: #6272a4;
			}

			.hljs-keyword,
			.hljs-selector-tag,
			.hljs-literal,
			.hljs-title,
			.hljs-section,
			.hljs-doctag,
			.hljs-type {
				color: #ff79c6;
			}

			.hljs-string,
			.hljs-attr,
			.hljs-symbol,
			.hljs-bullet,
			.hljs-addition {
				color: #f1fa8c;
			}

			.hljs-number,
			.hljs-regexp,
			.hljs-variable,
			.hljs-template-variable {
				color: #bd93f9;
			}

			.hljs-built_in,
			.hljs-builtin-name,
			.hljs-meta {
				color: #8be9fd;
			}

			pre code {
				white-space: pre;
			}

			.markdown-label {
				font-weight: 600;
				color: var(--accent);
			}
		</style>
	</head>
	<body>
		<main class="markdown">
			<div id="code-collection"></div>
		</main>

		<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
		<script>
			const codeCollection = document.getElementById("code-collection");

			function escapeHtml(value) {
				return value
					.replaceAll("&", "&amp;")
					.replaceAll("<", "&lt;")
					.replaceAll(">", "&gt;");
			}

			function createCodeCard(block, index) {
				const section = document.createElement("section");
				section.className = "code-card";
				section.setAttribute("aria-label", `${block.name} code block`);

				section.innerHTML = `
					<p class="code-path-line">
						<span class="code-path-label">Path:</span>
						<code class="code-path">${escapeHtml(block.path || "")}</code>
					</p>
					<div class="code-tab">${escapeHtml(block.name)}</div>
					<div class="code-shell">
						<div class="code-toolbar">
							<button class="copy-button" type="button" aria-label="Copy code">
								<svg viewBox="0 0 24 24" aria-hidden="true">
									<path d="M8 3.5A2.5 2.5 0 0 0 5.5 6v1H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h9a2 2 0 0 0 2-2v-1h1.5A2.5 2.5 0 0 0 19 14.5v-8A2.5 2.5 0 0 0 16.5 4H10a2 2 0 0 0-2 2v-.5A2.5 2.5 0 0 0 8 3.5Zm3.5 4V6a.5.5 0 0 1 .5-.5h4.5a1 1 0 0 1 1 1V14a1 1 0 0 1-1 1H15v-7a.5.5 0 0 0-.5-.5h-3Zm-6 1h9a.5.5 0 0 1 .5.5v9a.5.5 0 0 1-.5.5h-9a.5.5 0 0 1-.5-.5V9.5a.5.5 0 0 1 .5-.5Z" /></svg>
								<span class="copy-label">Copy</span>
							</button>
						</div>
						<pre><code class="language-${escapeHtml(block.language)}">${escapeHtml(block.code)}</code></pre>
					</div>
				`;

				const copyButton = section.querySelector(".copy-button");
				const copyLabel = section.querySelector(".copy-label");
				const codeBlock = section.querySelector("pre code");
				const language = String(block.language ?? "text").trim();
				if (codeBlock) {
					codeBlock.classList.add(language || "text");
					codeBlock.classList.add("hljs");
					if (window.hljs) {
						hljs.highlightElement(codeBlock);
					}
				}

				copyButton?.addEventListener("click", async () => {
					const text = codeBlock?.textContent ?? "";

					try {
						if (navigator.clipboard?.writeText) {
							await navigator.clipboard.writeText(text);
						} else {
							const textarea = document.createElement("textarea");
							textarea.value = text;
							textarea.setAttribute("readonly", "true");
							textarea.style.position = "absolute";
							textarea.style.left = "-9999px";
							document.body.appendChild(textarea);
							textarea.select();
							document.execCommand("copy");
							textarea.remove();
						}

						copyButton.dataset.state = "copied";
						if (copyLabel) {
							copyLabel.textContent = "Copied";
						}
						window.setTimeout(() => {
							copyButton.dataset.state = "";
							if (copyLabel) {
								copyLabel.textContent = "Copy";
							}
						}, 1200);
					} catch {
						if (copyLabel) {
							copyLabel.textContent = "Failed";
						}
						window.setTimeout(() => {
							if (copyLabel) {
								copyLabel.textContent = "Copy";
							}
						}, 1200);
					}
				});

				return section;
			}

			async function loadBlocksFromMetadata() {
				const metadataResponse = await fetch("metadata.json");
				if (!metadataResponse.ok) {
					throw new Error(
						`Failed to load metadata.json: ${metadataResponse.status}`
					);
				}

				const metadata = await metadataResponse.json();
				const files = Array.isArray(metadata?.files)
					? metadata.files
					: [];

				const blocks = [];
				for (const file of files) {
					const fileName = String(file?.name ?? "").trim();
					if (!fileName) {
						continue;
					}

					const fileResponse = await fetch(
						`files/${encodeURIComponent(fileName)}`
					);
					if (!fileResponse.ok) {
						throw new Error(
							`Failed to load files/${fileName}: ${fileResponse.status}`
						);
					}

					const code = await fileResponse.text();
					blocks.push({
						name: fileName,
						language: String(file?.language ?? "text"),
						path: String(file?.path ?? ""),
						code
					});
				}

				return blocks;
			}

			async function renderFromMetadata() {
				if (!codeCollection) {
					return;
				}

				try {
					const blocks = await loadBlocksFromMetadata();
					codeCollection.innerHTML = "";
					for (const [index, block] of blocks.entries()) {
						codeCollection.appendChild(
							createCodeCard(block, index)
						);
					}
				} catch (error) {
					const message =
						error instanceof Error
							? error.message
							: "Unknown error";
					codeCollection.innerHTML = `<p>Unable to load code files: ${escapeHtml(message)}</p>`;
				}
			}

			renderFromMetadata();
		</script>
	</body>
</html>
